site_name: Unraid API Documentation
site_description: Python Library for Unraid GraphQL API
site_author: DomaLab
site_url: https://domalab.github.io/unraid-api

# Repository
repo_name: domalab/unraid-api
repo_url: https://github.com/domalab/unraid-api
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; 2023 - Present DomaLab

# Theme Configuration
theme:
  name: material
  language: en
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  favicon: assets/favicon.ico
  logo: assets/logo.png

# Plugins
plugins:
  - search
  - minify:
      minify_html: true
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     enable_git_follow: false
  - tags

# Extensions
markdown_extensions:
  - meta
  - admonition
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
      auto_title: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Extra settings
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/domalab/unraid-api
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/unraid-api/
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.

# Extra CSS and JavaScript
extra_css:
  - assets/extra.css
extra_javascript:
  - assets/extra.js

# Navigation
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Authentication: getting-started/authentication.md
    - Quick Start: getting-started/quick-start.md
  - API Reference:
    - Overview: api-reference/overview.md
    - Array: api-reference/array.md
    - Disk: api-reference/disk.md
    - Docker: api-reference/docker.md
    - VM: api-reference/vm.md
    - System: api-reference/system.md
    - User: api-reference/user.md
    - Notification: api-reference/notification.md
  - Advanced Usage:
    - Real-time Subscriptions: advanced/subscriptions.md
    - Error Handling: advanced/error-handling.md
    - Caching: advanced/caching.md
  - CLI:
    - Overview: cli/overview.md
    - Commands: cli/commands.md
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - Release Process: development/release-process.md
  - About:
    - License: about/license.md
    - Changelog: about/changelog.md 