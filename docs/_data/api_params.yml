system_info:
  - name: include_temps
    type: boolean
    required: false
    description: Whether to include temperature information in the response.
  - name: include_usage
    type: boolean
    required: false
    description: Whether to include CPU and memory usage in the response.

array_status:
  - name: include_disks
    type: boolean
    required: false
    description: Whether to include detailed disk information in the response.
  - name: include_parity
    type: boolean
    required: false
    description: Whether to include parity information in the response.
